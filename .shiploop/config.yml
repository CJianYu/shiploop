version: 1
profile: team-pr
repository:
  defaultBranch: main
  strategy: short-branch
proof:
  requireFreshForCommit: true
  steps:
    - name: check
      command: npm run check
      required: true
      quick: true
    - name: test
      command: npm run test
      required: true
      quick: false
    - name: build
      command: npm run build
      required: true
      quick: false
risk:
  high:
    - .shiploop/config.yml
    - "**/migrations/**"
    - "**/auth/**"
    - "**/billing/**"
    - "**/permissions/**"
    - .github/workflows/**
    - "**/package-lock.json"
    - "**/pnpm-lock.yaml"
    - "**/yarn.lock"
    - "**/Cargo.lock"
    - "**/poetry.lock"
    - "**/uv.lock"
    - "**/go.sum"
    - "**/Package.resolved"
  medium:
    - "**/api/**"
    - "**/config/**"
    - "**/scripts/**"
    - "**/*.sql"
commit:
  conventional: true
  maxSubjectLength: 72
github:
  requiredEvidence:
    - review
  maxAutomergeRisk: low
  requireApproval: false
  mergeMethod: squash
