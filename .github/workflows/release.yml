name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - name: Build the release artifact
        id: pack
        shell: bash
        run: |
          artifact="$(npm pack --json | node -e "let value=''; process.stdin.on('data', chunk => value += chunk); process.stdin.on('end', () => console.log(JSON.parse(value)[0].filename));")"
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"
      - name: Generate immutable release evidence
        run: >-
          node dist/cli.js release manifest
          --tag "$GITHUB_REF_NAME"
          --artifact "${{ steps.pack.outputs.artifact }}"
          --output release-manifest.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-evidence
          path: |
            ${{ steps.pack.outputs.artifact }}
            release-manifest.json
          if-no-files-found: error
          retention-days: 30

  publish:
    needs: validate
    environment: npm-release
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: npm run build
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: release-evidence
          path: release-evidence
      - name: Verify the exact validated artifact
        id: artifact
        shell: bash
        run: |
          artifact="$(find release-evidence -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          test -n "$artifact"
          node dist/cli.js release verify \
            --manifest release-evidence/release-manifest.json \
            --artifact "$artifact"
          echo "path=$artifact" >> "$GITHUB_OUTPUT"
      - name: Check for an identical published version
        id: registry
        shell: bash
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          if ! registry_version=$(npm view "$package_name@$package_version" version --json 2>&1); then
            if [[ "$registry_version" != *E404* ]]; then
              echo "$registry_version" >&2
              exit 1
            fi
            echo "already-published=false" >> "$GITHUB_OUTPUT"
          else
            published_head=$(npm view "$package_name@$package_version" gitHead --json)
            published_head=${published_head//\"/}
            test "$published_head" = "$GITHUB_SHA"
            echo "already-published=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish the validated artifact with provenance
        if: steps.registry.outputs.already-published != 'true'
        run: npm publish "${{ steps.artifact.outputs.path }}"
      - name: Verify npm publication
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          test "$(npm view "$package_name@$package_version" version)" = "$package_version"
          test "$(npm view "$package_name@$package_version" gitHead)" = "$GITHUB_SHA"
      - name: Create or preserve the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
