name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Verify tag matches package version
        run: >-
          node -e "const version = require('./package.json').version;
          if ('v' + version !== process.env.GITHUB_REF_NAME) {
            console.error('Tag ' + process.env.GITHUB_REF_NAME + ' does not match package v' + version);
            process.exit(1);
          }"
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: npm publish
      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
